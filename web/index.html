<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24'%3E%3Crect width='24' height='24' rx='5' fill='%232563eb'/%3E%3Crect x='5' y='12' width='3.2' height='7' rx='1' fill='white'/%3E%3Crect x='10.4' y='8' width='3.2' height='11' rx='1' fill='white'/%3E%3Crect x='15.8' y='5' width='3.2' height='14' rx='1' fill='white'/%3E%3C/svg%3E" />
    <title>QC KPI Dashboard</title>
    <script>
      // Apply saved/OS theme before paint to avoid a flash of the wrong mode.
      (function () {
        try {
          var s = localStorage.getItem('qc-theme');
          var dark = s === 'dark' || (!s && window.matchMedia('(prefers-color-scheme: dark)').matches);
          if (dark) document.documentElement.classList.add('dark');
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
